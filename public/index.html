<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Cadastro de Cursos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

  <div class="card shadow p-4">
    <h2 class="text-center mb-4">Cadastro de Cursos</h2>

    <form id="formCurso">
      <input type="hidden" id="id">

      <div class="mb-3">
        <input type="text" id="titulo" class="form-control" placeholder="Título do curso">
      </div>

      <div class="mb-3">
        <textarea id="descricao" class="form-control" placeholder="Descrição"></textarea>
      </div>

      <div class="mb-3">
        <input type="number" id="carga" class="form-control" placeholder="Carga horária">
      </div>

      <div class="mb-3">
        <input type="number" id="preco" class="form-control" placeholder="Preço">
      </div>

      <button class="btn btn-primary w-100">Salvar</button>
    </form>

    <div id="mensagem" class="mt-3"></div>
  </div>

  <div class="card shadow mt-5 p-4">
    <h3 class="text-center mb-3">Cursos cadastrados</h3>

    <table class="table table-hover">
      <thead class="table-dark">
        <tr>
          <th>Título</th>
          <th>Descrição</th>
          <th>Carga</th>
          <th>Preço</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="tabela"></tbody>
    </table>
  </div>

</div>

<script src="js/app.js"></script>
</body>
</html>
